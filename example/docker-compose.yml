networks:
  twinengine-network:
    name: twinengine-network

services:
  nginx:
    image: nginx:trixie-perl
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template
    restart: always
    depends_on:
      aas-template-registry:
        condition: service_healthy
      sm-template-registry:
        condition: service_healthy
      template-repository:
        condition: service_healthy
    networks:
      - twinengine-network

  twinengine-dataengine:
    image: ghcr.io/aas-twinengine/dataengine:v1.0.0
    container_name: twinengine-dataengine
    depends_on:
      dpp-plugin:
        condition: service_started
    restart: always
    environment:
      - General__DataEngineRepositoryBaseUrl=http://localhost:8080
      - General__CustomerDomainUrl=https://mm-software.com
      - Plugins__Instances__0__Name=RelationalDatabasePlugin
      - Plugins__Instances__0__baseUrl=http://dpp-plugin:8080
      - Plugins__Instances__0__headerMappings__0__source=Authorization
      - Plugins__Instances__0__headerMappings__0__target=X-Auth-Token
      - Plugins__Instances__0__headerMappings__0__required=false
      - Plugins__Instances__0__headerMappings__1__source=X-Organization-Id
      - Plugins__Instances__0__headerMappings__1__target=X-Tenant-Context
      - Plugins__Instances__0__headerMappings__1__required=false
      - TemplateManagement__TemplateMappingRules__SubmodelTemplateMappings__0__templateId=https://admin-shell.io/ZVEI/TechnicalData/Submodel/1/2
      - TemplateManagement__TemplateMappingRules__SubmodelTemplateMappings__0__pattern__0=TechnicalData
      - TemplateManagement__TemplateMappingRules__SubmodelTemplateMappings__1__templateId=https://admin-shell.io/idta/SubmodelTemplate/DigitalNameplate/3/0
      - TemplateManagement__TemplateMappingRules__SubmodelTemplateMappings__1__pattern__0=Nameplate
      - TemplateManagement__TemplateMappingRules__SubmodelTemplateMappings__2__templateId=https://admin-shell.io/idta/SubmodelTemplate/ContactInformation/1/0
      - TemplateManagement__TemplateMappingRules__SubmodelTemplateMappings__2__pattern__0=ContactInformation
      - TemplateManagement__TemplateMappingRules__SubmodelTemplateMappings__3__templateId=https://admin-shell.io/idta/SubmodelTemplate/CarbonFootprint/1/0
      - TemplateManagement__TemplateMappingRules__SubmodelTemplateMappings__3__pattern__0=CarbonFootprint
      - TemplateManagement__TemplateMappingRules__SubmodelTemplateMappings__4__templateId=https://admin-shell.io/idta/SubmodelTemplate/HandoverDocumentation/2/0
      - TemplateManagement__TemplateMappingRules__SubmodelTemplateMappings__4__pattern__0=HandoverDocumentation
      - TemplateManagement__TemplateMappingRules__ShellTemplateMappings__0__templateId=https://mm-software.com/aas/aasTemplate
      - TemplateManagement__TemplateMappingRules__ShellTemplateMappings__0__pattern__0=
      - TemplateManagement__TemplateMappingRules__AasIdExtractionRules__0__Strategy=Split
      - TemplateManagement__TemplateMappingRules__AasIdExtractionRules__0__Pattern=/
      - TemplateManagement__TemplateMappingRules__AasIdExtractionRules__0__Index=5
      - TemplateManagement__AasTemplateRepository__Name=AasTemplateRepository
      - TemplateManagement__AasTemplateRepository__baseUrl=http://template-repository:8081
      - TemplateManagement__AasTemplateRepository__headerMappings__0__source=Authorization
      - TemplateManagement__AasTemplateRepository__headerMappings__0__target=Authorization
      - TemplateManagement__AasTemplateRepository__headerMappings__0__required=false
      - TemplateManagement__SubmodelTemplateRepository__Name=SubmodelTemplateRepository
      - TemplateManagement__SubmodelTemplateRepository__baseUrl=http://template-repository:8081
      - TemplateManagement__SubmodelTemplateRepository__headerMappings__0__source=Authorization
      - TemplateManagement__SubmodelTemplateRepository__headerMappings__0__target=Authorization
      - TemplateManagement__SubmodelTemplateRepository__headerMappings__0__required=false
      - TemplateManagement__ConceptDescriptionTemplateRepository__Name=ConceptDescriptionTemplateRepository
      - TemplateManagement__ConceptDescriptionTemplateRepository__baseUrl=http://template-repository:8081
      - TemplateManagement__ConceptDescriptionTemplateRepository__headerMappings__0__source=Authorization
      - TemplateManagement__ConceptDescriptionTemplateRepository__headerMappings__0__target=Authorization
      - TemplateManagement__ConceptDescriptionTemplateRepository__headerMappings__0__required=false
      - TemplateManagement__AasTemplateRegistry__Name=AasTemplateRegistry
      - TemplateManagement__AasTemplateRegistry__baseUrl=http://aas-template-registry:8080
      - TemplateManagement__AasTemplateRegistry__headerMappings__0__source=Authorization
      - TemplateManagement__AasTemplateRegistry__headerMappings__0__target=Authorization
      - TemplateManagement__AasTemplateRegistry__headerMappings__0__required=false
      - TemplateManagement__SubmodelTemplateRegistry__Name=SubmodelTemplateRegistry
      - TemplateManagement__SubmodelTemplateRegistry__baseUrl=http://sm-template-registry:8080
      - TemplateManagement__SubmodelTemplateRegistry__headerMappings__0__source=Authorization
      - TemplateManagement__SubmodelTemplateRegistry__headerMappings__0__target=Authorization
      - TemplateManagement__SubmodelTemplateRegistry__headerMappings__0__required=false
    networks:
      - twinengine-network

  dpp-plugin:
    image: ghcr.io/aas-twinengine/plugindpp:v1.0.0
    container_name: dpp-plugin
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    environment:
      - Semantics__IndexContextPrefix=_aastwinengineindex_
      - Capabilities__HasShellDescriptor=true
      - Capabilities__HasAssetInformation=true
      - RelationalDatabaseConfiguration__ConnectionString=Host=postgres;Port=5432;Database=twinengine;Username=postgres;Password=admin
      - ExtractionRules__SubmodelNameExtractionRules__0__SubmodelName=NamePlate
      - ExtractionRules__SubmodelNameExtractionRules__0__pattern__0=Nameplate
      - ExtractionRules__SubmodelNameExtractionRules__0__pattern__1=NamePlate
      - ExtractionRules__SubmodelNameExtractionRules__1__SubmodelName=ContactInformation
      - ExtractionRules__SubmodelNameExtractionRules__1__pattern__0=ContactInformation
      - ExtractionRules__SubmodelNameExtractionRules__1__pattern__1=ContactInformations
      - ExtractionRules__SubmodelNameExtractionRules__2__SubmodelName=HandoverDocumentation
      - ExtractionRules__SubmodelNameExtractionRules__2__pattern__0=HandoverDocumentation
      - ExtractionRules__SubmodelNameExtractionRules__2__pattern__1=HandoverDocumentations
      - ExtractionRules__SubmodelNameExtractionRules__3__SubmodelName=TechnicalData
      - ExtractionRules__SubmodelNameExtractionRules__3__pattern__0=TechnicalData
      - ExtractionRules__SubmodelNameExtractionRules__4__SubmodelName=CarbonFootprint
      - ExtractionRules__SubmodelNameExtractionRules__4__pattern__0=CarbonFootprint
      - ExtractionRules__SubmodelNameExtractionRules__4__pattern__1=Footprint
      - ExtractionRules__SubmodelNameExtractionRules__4__pattern__2=Carbon
      - ExtractionRules__ProductIdExtractionRules__0__Pattern=/
      - ExtractionRules__ProductIdExtractionRules__0__Index=5
      - ExtractionRules__ProductIdExtractionRules__0__Strategy=Split
      - ExtractionRules__ProductIdExtractionRules__0__Description=Default split by '/' segment 5
    networks:
      - twinengine-network

  template-repository:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: template-repository
    volumes:
      - ./aas:/application/aas
      - ./basyx/aas-env.properties:/application/application.properties
    environment:
      BASYX_EXTERNALURL : http://localhost:8080
    restart: always
    depends_on:
      aas-template-registry:
        condition: service_healthy
      sm-template-registry:
        condition: service_healthy
    networks:
      - twinengine-network

  aas-template-registry:
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-SNAPSHOT
    container_name: aas-template-registry
    restart: always
    depends_on:
      - mongo
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongoAdmin:mongoPassword@mongo:27017
    networks:
      - twinengine-network

  sm-template-registry:
    image: eclipsebasyx/submodel-registry-log-mongodb:2.0.0-SNAPSHOT
    container_name: sm-template-registry
    depends_on:
      - mongo
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongoAdmin:mongoPassword@mongo:27017
    networks:
      - twinengine-network

  aas-web-ui:
    image: eclipsebasyx/aas-gui:SNAPSHOT
    container_name: aas-ui
    volumes:
      - ./logo:/usr/src/app/dist/Logo
    environment:
      AAS_REGISTRY_PATH: http://localhost:8080/shell-descriptors
      SUBMODEL_REGISTRY_PATH: http://localhost:8080/submodel-descriptors
      AAS_REPO_PATH: http://localhost:8080/shells
      SUBMODEL_REPO_PATH: http://localhost:8080/submodels
      CD_REPO_PATH: http://localhost:8080/concept-descriptions
      BASE_PATH: "/aas-ui"
      LOGO_PATH: "MM_Logo.svg"
      PRIMARY_DARK_COLOR: "#00F2E5"
      PRIMARY_LIGHT_COLOR: "#041b2b"
    restart: always
    depends_on:
      template-repository:
        condition: service_healthy
    networks:
      - twinengine-network

  mongo:
    image: mongo:6.0
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoAdmin
      MONGO_INITDB_ROOT_PASSWORD: mongoPassword
    networks:
      - twinengine-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: twinengine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twinengine"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - twinengine-network

  pgadmin:
    image: dpage/pgadmin4:snapshot
    container_name: pgadmin
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - twinengine-network